<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- 📱 Mobile Optimization -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <!-- 🧠 SEO -->
    <title>
      Game Hub | Whot • Bottle • Dice • Horse Racing
    </title>

    <meta
      name="description"
      content="Play Whot, Bottle Flip, Dice Battle and Horse Racing online."
    />

    <!-- 🎨 Theme -->
    <meta name="theme-color" content="#020617" />

    <!-- 🔥 Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #020617;
        --card: rgba(15, 23, 42, 0.85);
        --border: rgba(255, 255, 255, 0.08);
        --text: #ffffff;
        --muted: #94a3b8;
        --primary: #3b82f6;
        --primary-hover: #2563eb;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow-x: hidden;
        background: linear-gradient(
          180deg,
          #020617 0%,
          #0f172a 100%
        );

        color: var(--text);

        font-family: "Poppins", sans-serif;

        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;

        overscroll-behavior: none;
      }

      body::before {
        content: "";

        position: fixed;
        inset: 0;

        background:
          radial-gradient(
            circle at top left,
            rgba(59, 130, 246, 0.2),
            transparent 30%
          ),
          radial-gradient(
            circle at bottom right,
            rgba(168, 85, 247, 0.18),
            transparent 30%
          );

        pointer-events: none;
        z-index: 0;
      }

      #root {
        min-height: 100%;
        position: relative;
        z-index: 1;
      }

      button {
        cursor: pointer;
        border: none;
        outline: none;

        font-family: inherit;

        transition:
          transform 0.15s ease,
          opacity 0.2s ease,
          background 0.2s ease;
      }

      button:hover {
        opacity: 0.95;
      }

      button:active {
        transform: scale(0.96);
      }

      button,
      img {
        user-select: none;
        -webkit-user-drag: none;
      }

      input,
      textarea {
        font-family: inherit;
        outline: none;
      }

      ::-webkit-scrollbar {
        width: 8px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.15);
        border-radius: 999px;
      }

      /* 📱 Mobile tweaks */
      @media (max-width: 768px) {
        body {
          font-size: 14px;
        }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <!-- ⚡ React Entry -->
    <script
      type="module"
      src="/src/main.jsx"
    ></script>
  </body>
</html>
