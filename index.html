<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- 📱 Mobile -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <!-- 🧠 SEO -->
    <title>
      Game Hub | Whot • Bottle • Dice • Horse Racing
    </title>

    <meta
      name="description"
      content="Play Whot, Bottle Flip, Dice Battle and Horse Racing online."
    />

    <!-- 🎨 Theme -->
    <meta name="theme-color" content="#020617" />

    <!-- 🔥 Google Font -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        width: 100%;
        min-height: 100vh;
      }

      body {
        background: #020617;
        color: white;

        font-family: "Poppins", sans-serif;

        overflow-x: hidden;

        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      button {
        border: none;
        outline: none;
        cursor: pointer;

        transition: 0.2s;
      }

      button:active {
        transform: scale(0.97);
      }

      input {
        outline: none;
      }

      ::-webkit-scrollbar {
        width: 6px;
      }

      ::-webkit-scrollbar-thumb {
        background: rgba(255,255,255,0.2);
        border-radius: 999px;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <script
      type="module"
      src="/src/main.jsx"
    ></script>
  </body>
</html>
